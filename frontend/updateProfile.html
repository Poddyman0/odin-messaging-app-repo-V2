<div id="update-profile-form-container">
  <form id="update-profile-form">
    <div><strong>Update Profile:</strong></div>
    <br>
      <div class="form-group">
          <label for="name-update"><strong>Name:</strong></label>
          <input type="text" class="form-control" id="name-update" required>
          <br>
          <label for="email-update"><strong>Email:</strong></label>
          <input type="text" class="form-control" id="email-update" required>
          <br>
          <label for="password-update"><strong>Password:</strong></label>
          <input type="text" class="form-control" id="password-update" required>
          <br>

          <p>Add or remove Friends:</p>
          <div id="add-friends-radio-container"></div>
          <br>
