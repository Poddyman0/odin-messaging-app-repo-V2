<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Create Profile</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">
    <link rel="stylesheet" href="signInForm.css">
  </head>
<body id="sign-in-body">
    <script src="signInForm.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4" crossorigin="anonymous"></script>
<header>
</header>
<div id="sign-in-container">
  <form id="signInForm">
      <div><strong>Sign In:</strong></div>
      <br>
      <label for="email-sign-in"><strong>Email:</strong></label>
      <input type="email" class="form-control" id="email-sign-in"  required>
      <br>
      <label for="password-sign-in"><strong>Password:</strong></label>
      <input type="password" class="form-control" id="password-sign-in" required>
      <br>
      <button type="submit" id="submit" class="btn btn-success btn-sign-in"><strong>Sign In</strong></button>
      <br>
      <br>
      <div>Don't have an account?</div>
      <button class="btn btn-success" id="btn-create-account"><strong>Create Account</strong></button>
      <br>
  </form>
  <div>Use demo username ("exampleemail1@domain.com") and password ("password1") to login.
  </div>
  <div id="responseFeedback"></div>
</div>
</body>
