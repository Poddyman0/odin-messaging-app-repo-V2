<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Create Profile</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">
    <link rel="stylesheet" href="createProfile.css">
  </head>
<body id="body-profile-create">
    <script src="createProfile.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4" crossorigin="anonymous"></script>
<header>

</header>
<div id="profile-container">
  <form id="profile-form">
    <div id="create-profile-title"><strong>Create Profile:</strong></div>
    <div class="form-group">
        <label for="name-sign-up"><strong>Name:</strong></label>
        <input type="text" class="form-control" id="name-sign-up" placeholder="Enter name" required>
        <br>
        <label for="email-sign-up"><strong>Email:</strong></label>
        <input type="text" class="form-control" id="email-sign-up" placeholder="Enter email" required>
        <br>
        <label for="password-sign-up"><strong>Password:</strong></label>
        <input type="text" class="form-control" id="password-sign-up" placeholder="Enter password" required>
        <br>
        <p><strong>Add Friends</strong></p>
        <div id="add-friends-radio-container"></div>
        <br>
        <button type="submit" class="btn btn-success btn-sign-up" id="btn-sign-up"><strong>Create Profile</strong></button>
      </div>
  </form>
</div>
<div id="responseFeedback"></div>
</body>
